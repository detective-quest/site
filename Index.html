<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рабочий стол</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e1e;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== LOGIN ===== */
        #login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2b2b2b, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            padding: 20px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #007aff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 32px;
            color: #fff;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
        }

        .login-box h1 {
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }

        .login-box p {
            color: rgba(255, 255, 255, 0.4);
            font-size: clamp(13px, 3vw, 16px);
            margin-bottom: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            margin-bottom: 16px;
            text-align: center;
        }

        .login-box input:focus {
            border-color: #007aff;
            background: rgba(255, 255, 255, 0.12);
        }

        .login-box input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: #007aff;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-box button:hover {
            background: #0066d9;
        }

        .login-error {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 14px;
            min-height: 20px;
        }

        /* ===== DESKTOP ===== */
        #desktop {
            display: none;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            position: relative;
            padding: 10px;
            overflow: hidden;
        }

        /* Декоративные цветные фигуры */
        #desktop::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 70vmax;
            height: 70vmax;
            background: radial-gradient(circle, rgba(255, 0, 150, 0.4) 0%, rgba(0, 204, 255, 0.2) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }

        #desktop::after {
            content: '';
            position: absolute;
            bottom: -15%;
            left: -15%;
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(0, 255, 200, 0.35) 0%, rgba(255, 100, 0, 0.2) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
            z-index: 0;
        }

        .blob-extra {
            position: absolute;
            bottom: 10%;
            right: 5%;
            width: 40vmax;
            height: 40vmax;
            background: radial-gradient(circle, rgba(255, 200, 0, 0.25) 0%, rgba(255, 100, 200, 0.15) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }

        .top-bar, .desktop-icons, .dock {
            position: relative;
            z-index: 1;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 28px;
            background: rgba(30, 30, 30, 0.5);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 50;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .top-bar .time {
            font-weight: 500;
        }

        /* Desktop icons – flex-контейнер без абсолютного позиционирования для мобилок */
        .desktop-icons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            padding: 10px;
            height: calc(100vh - 120px);
            align-content: flex-start;
            justify-content: flex-start;
            margin-top: 30px;
            z-index: 1;
            position: relative;
        }

        .desktop-folder {
            width: 90px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            padding: 8px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .desktop-folder:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .desktop-folder .icon {
            font-size: 52px;
            line-height: 1;
            display: block;
        }

        .desktop-folder .label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            margin-top: 4px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
            word-break: break-word;
            line-height: 1.2;
        }

        .desktop-folder .label.unnamed {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        /* Убираем абсолютное позиционирование для иконок на всех экранах,
           чтобы они всегда были в потоке и не налезали */
        .desktop-icons .right-icon {
            position: static !important;
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 640px) {
            .desktop-icons {
                gap: 12px;
                padding: 8px;
                justify-content: center;
            }
            .desktop-folder {
                width: 80px;
                padding: 6px;
            }
            .desktop-folder .icon {
                font-size: 44px;
            }
            .desktop-folder .label {
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .desktop-icons {
                gap: 8px;
                padding: 4px;
            }
            .desktop-folder {
                width: 70px;
                padding: 4px;
            }
            .desktop-folder .icon {
                font-size: 36px;
            }
            .desktop-folder .label {
                font-size: 10px;
            }
            .top-bar {
                font-size: 10px;
                height: 24px;
            }
            .dock {
                padding: 6px 10px;
                gap: 6px;
                bottom: 8px;
            }
            .dock-icon {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
        }

        /* ===== DOCK ===== */
        .dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(30px);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .dock-icon {
            width: 54px;
            height: 54px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dock-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
        }

        /* ===== WINDOW ===== */
        .window-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .window-overlay.active {
            display: flex;
        }

        .window {
            width: 95%;
            max-width: 95vw;
            height: 90vh;
            max-height: 90vh;
            background: #2c2c2e;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 640px) {
            .window {
                width: 98%;
                max-width: 98vw;
                height: 95vh;
                max-height: 95vh;
                border-radius: 12px;
                padding: 0;
            }
        }

        .window-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #3a3a3c;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .window-header .title {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            margin-left: 10px;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .window-header .close {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ff5f57;
            border: none;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            flex-shrink: 0;
        }

        .window-header .close:hover {
            background: #ff7a72;
        }

        .window-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            color: #ddd;
            font-size: 14px;
            background: #2c2c2e;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 640px) {
            .window-body {
                padding: 12px;
                font-size: 13px;
            }
        }

        .window-body .folder-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.1s;
            color: #ddd;
        }

        .window-body .folder-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .window-body .folder-item .icon {
            font-size: 28px;
        }

        .window-body .folder-item .name {
            font-size: 14px;
        }

        .window-body .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            border-radius: 6px;
            color: #ddd;
            cursor: pointer;
            transition: background 0.15s;
            word-break: break-word;
        }

        .window-body .file-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .window-body .file-item .icon {
            font-size: 22px;
            flex-shrink: 0;
        }

        .window-body .file-item .name {
            font-size: 13px;
            flex: 1;
            word-break: break-word;
        }

        .window-body .file-item .download {
            margin-left: auto;
            font-size: 12px;
            color: #007aff;
            padding: 4px 8px;
            border-radius: 4px;
            transition: 0.15s;
            flex-shrink: 0;
        }

        .window-body .file-item .download:hover {
            background: rgba(0, 122, 255, 0.15);
        }

        .window-body .back-btn {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            font-size: 12px;
            color: #aaa;
            cursor: pointer;
            margin-bottom: 12px;
            transition: 0.1s;
            align-self: flex-start;
        }

        .window-body .back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* ===== MAIL ===== */
        .mail-layout {
            display: flex;
            height: 100%;
            gap: 0;
            background: #2c2c2e;
            border-radius: 0 0 16px 16px;
            flex: 1;
            min-height: 0;
        }

        .mail-sidebar {
            width: 180px;
            background: #262628;
            padding: 12px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            overflow-y: auto;
        }

        .mail-sidebar .folder {
            padding: 6px 16px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s;
            border-radius: 6px;
            margin: 0 6px;
        }

        .mail-sidebar .folder:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }

        .mail-sidebar .folder.active {
            background: rgba(0, 122, 255, 0.2);
            color: #007aff;
        }

        #mailContent {
            flex: 1;
            overflow-y: auto;
            background: #2c2c2e;
            padding: 0 8px;
            min-height: 0;
        }

        .mail-item {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 6px;
            margin: 2px 0;
        }

        .mail-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .mail-item .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #007aff;
            flex-shrink: 0;
        }

        .mail-item .status.read {
            background: transparent;
        }

        .mail-item .from {
            color: #ddd;
            font-size: 13px;
            font-weight: 500;
            min-width: 100px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item .subject {
            color: #aaa;
            font-size: 13px;
            flex: 1;
            margin: 0 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-item .date {
            color: #666;
            font-size: 12px;
            white-space: nowrap;
        }

        /* Адаптация почты для телефона */
        @media (max-width: 640px) {
            .mail-sidebar {
                width: 140px;
            }
            .mail-sidebar .folder {
                font-size: 12px;
                padding: 5px 12px;
            }
            .mail-item {
                padding: 10px 12px;
                gap: 8px;
            }
            .mail-item .from {
                min-width: 70px;
                font-size: 12px;
            }
            .mail-item .subject {
                font-size: 12px;
                margin: 0 6px;
            }
            .mail-item .date {
                font-size: 10px;
            }
        }

        @media (max-width: 480px) {
            .mail-sidebar {
                width: 100px;
                padding: 8px 0;
            }
            .mail-sidebar .folder {
                font-size: 11px;
                padding: 4px 10px;
                margin: 0 4px;
            }
            .mail-item {
                padding: 8px 8px;
                gap: 6px;
            }
            .mail-item .from {
                min-width: 60px;
                font-size: 11px;
            }
            .mail-item .subject {
                font-size: 11px;
                margin: 0 4px;
            }
            .mail-item .date {
                font-size: 9px;
            }
            .mail-back {
                font-size: 12px;
            }
            .mail-header-item {
                font-size: 12px;
            }
            .mail-body-text {
                font-size: 13px;
            }
        }

        .mail-back {
            color: #007aff;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            transition: background 0.15s;
            align-self: flex-start;
        }

        .mail-back:hover {
            background: rgba(0, 122, 255, 0.15);
            text-decoration: none;
        }

        .mail-header {
            color: #ddd;
        }

        .mail-header-item {
            color: #ddd;
            font-size: 13px;
            line-height: 1.6;
        }

        .mail-header-item strong {
            color: #aaa;
            font-weight: 500;
        }

        .mail-header-line {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin: 8px 0 12px 0;
            width: 100%;
        }

        .mail-body-text {
            margin-top: 12px;
            color: #ccc;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            flex: 1;
        }

        /* scroll */
        .window-body::-webkit-scrollbar,
        #mailContent::-webkit-scrollbar,
        .mail-sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .window-body::-webkit-scrollbar-track,
        #mailContent::-webkit-scrollbar-track,
        .mail-sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .window-body::-webkit-scrollbar-thumb,
        #mailContent::-webkit-scrollbar-thumb,
        .mail-sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- ===== LOGIN ===== -->
    <div id="login">
        <div class="login-box">
            <div class="login-avatar">👤</div>
            <h1>Рабочий стол</h1>
            <p>Введите пароль для входа</p>
            <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="off">
            <button onclick="handleLogin()">Войти</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- ===== DESKTOP ===== -->
    <div id="desktop">
        <!-- Декоративные блобы -->
        <div class="blob-extra"></div>

        <div class="top-bar">
            <span>🔍 Рабочий стол</span>
            <span class="time" id="clock">22:00</span>
        </div>

        <!-- desktop icons – теперь без absolute, все в потоке -->
        <div class="desktop-icons">
            <div class="desktop-folder" onclick="openFolder('contracts')">
                <span class="icon">📁</span>
                <span class="label">Договоры</span>
            </div>

            <div class="desktop-folder" onclick="openFolder('will')">
                <span class="icon">📁</span>
                <span class="label">Завещание</span>
            </div>

            <div class="desktop-folder" onclick="openFolder('audio')">
                <span class="icon">📁</span>
                <span class="label unnamed">Без названия</span>
            </div>

            <div class="desktop-folder" onclick="openMail()">
                <span class="icon">✉️</span>
                <span class="label">Почта</span>
            </div>
        </div>

        <!-- dock -->
        <div class="dock">
            <div class="dock-icon" onclick="openFolder('contracts')">📁</div>
            <div class="dock-icon" onclick="openFolder('will')">📄</div>
            <div class="dock-icon" onclick="openFolder('audio')">🎵</div>
            <div class="dock-icon" onclick="openMail()">✉️</div>
        </div>
    </div>

    <!-- ===== WINDOW OVERLAY ===== -->
    <div class="window-overlay" id="windowOverlay">
        <div class="window" id="window">
            <div class="window-header">
                <button class="close" onclick="closeWindow()">✕</button>
                <span class="title" id="windowTitle">Папка</span>
            </div>
            <div class="window-body" id="windowBody">
                <!-- dynamic content -->
            </div>
        </div>
    </div>

    <script>
        // ===== LOGIN =====
        function handleLogin() {
            const password = document.getElementById('passwordInput').value.trim();
            const err = document.getElementById('loginError');
            if (password === '1408569432!') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('desktop').style.display = 'block';
                updateClock();
                setInterval(updateClock, 1000);
            } else {
                err.textContent = 'Неверный пароль';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const loginDiv = document.getElementById('login');
                if (loginDiv.style.display !== 'none') {
                    handleLogin();
                }
            }
        });

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m;
        }

        // ===== WINDOW =====
        function closeWindow() {
            document.getElementById('windowOverlay').classList.remove('active');
        }

        function openWindow(title, html) {
            document.getElementById('windowTitle').textContent = title;
            document.getElementById('windowBody').innerHTML = html;
            document.getElementById('windowOverlay').classList.add('active');
        }

        // ===== FOLDERS =====
        const fileSystem = {
            contracts: {
                type: 'folder',
                children: {
                    '2023': {
                        type: 'folder',
                        children: {
                            'Договор_АльянсМед_2023.pdf': { type: 'file', path: 'docs/Договор_АльянсМед_2023.pdf' }
                        }
                    },
                    '2024': {
                        type: 'folder',
                        children: {
                            'Договор_МедТехСнаб_2024.pdf': { type: 'file', path: 'docs/Договор_МедТехСнаб_2024.pdf' },
                            'Договор_ФармЛог_2024.pdf': { type: 'file', path: 'docs/Договор_ФармЛог_2024.pdf' }
                        }
                    },
                    '2025': {
                        type: 'folder',
                        children: {
                            'Договор_МедТехн_2025.pdf': { type: 'file', path: 'docs/Договор_МедТехн_2025.pdf' }
                        }
                    }
                }
            },
            will: {
                type: 'folder',
                children: {
                    'Завещание.pdf': { type: 'file', path: 'docs/Завещание.pdf' }
                }
            },
            audio: {
                type: 'folder',
                children: {
                    'аудио_василий.mp3': { type: 'file', path: 'audio/аудио_василий.mp3' }
                }
            }
        };

        function openFolder(id) {
            if (id === 'audio') {
                const folder = fileSystem.audio;
                let html = renderFolder(id, folder);
                openWindow('Без названия', html);
                return;
            }
            const folder = fileSystem[id];
            if (!folder) return;
            let html = renderFolder(id, folder);
            const title = id === 'contracts' ? 'Договоры' : id === 'will' ? 'Завещание' : 'Папка';
            openWindow(title, html);
        }

        function renderFolder(id, folder, path = []) {
            const entries = Object.entries(folder.children || {});
            if (entries.length === 0) {
                return '<div style="color:#666;padding:20px;">Папка пуста</div>';
            }

            let html = '';
            if (path.length > 0) {
                const backPath = path.slice(0, -1);
                html += `<div class="back-btn" onclick="navigateBack('${id}', '${backPath.join('/')}')">← Назад</div>`;
            }

            for (const [name, item] of entries) {
                if (item.type === 'folder') {
                    html += `
                        <div class="folder-item" onclick="navigateFolder('${id}', '${name}', '${path.join('/')}')">
                            <span class="icon">📁</span>
                            <span class="name">${name}</span>
                        </div>
                    `;
                } else {
                    const filePath = item.path;
                    html += `
                        <div class="file-item" onclick="window.open('${filePath}', '_blank')">
                            <span class="icon">📄</span>
                            <span class="name">${name}</span>
                            <span class="download" onclick="event.stopPropagation(); window.open('${filePath}', '_blank')">⬇</span>
                        </div>
                    `;
                }
            }
            return html;
        }

        function navigateFolder(id, childName, currentPath) {
            const folder = fileSystem[id];
            const pathSegments = currentPath ? currentPath.split('/').filter(Boolean) : [];
            const newPath = [...pathSegments, childName];

            let current = folder;
            for (const seg of newPath) {
                if (current.children && current.children[seg]) {
                    current = current.children[seg];
                } else {
                    return;
                }
            }
            if (current.type === 'folder') {
                const html = renderFolder(id, current, newPath);
                openWindow('Договоры', html);
            }
        }

        function navigateBack(id, backPathStr) {
            const folder = fileSystem[id];
            const pathSegments = backPathStr ? backPathStr.split('/').filter(Boolean) : [];
            let current = folder;
            for (const seg of pathSegments) {
                if (current.children && current.children[seg]) {
                    current = current.children[seg];
                } else {
                    return;

            }
            const html = renderFolder(id, current, pathSegments);
            openWindow('Договоры', html);

        function parseDate(str) {
            const parts = str.split('.');
            return new Date(parts[2], parts[1] - 1, parts[0]);
        }

        function sortMails(mails) {
            return mails.slice().sort((a, b) => parseDate(b.date) - parseDate(a.date));
        }

        const mailFolders = {
            inbox: sortMails(allMails),
            sent: [],
            spam: [],
            draft: [],
            trash: []
        };

        mailFolders.sent = [

                        <div class="folder" data-folder="sent" onclick="switchMailFolder('sent')">📤 Отправленные (${mailFolders.sent.length})</div>
                        <div class="folder" data-folder="spam" onclick="switchMailFolder('spam')">⚠️ Спам (${mailFolders.spam.length})</div>
                        <div class="folder" data-folder="draft" onclick="switchMailFolder('draft')">📝 Черновики (${mailFolders.draft.length})</div>
                        <div class="folder" data-folder="trash" onclick="switchMailFolder('trash')">🗑 Корзина (${mailFolders.trash.length})</div>
                    </div>
                    <div id="mailContent">
                        ${renderMailListContent()}
                    </div>
                </div>

        function renderMailListContent() {
            if (!currentMailList || currentMailList.length === 0) {
                return '<div style="padding:20px;color:#666;">Нет писем</div>';
            }
            let html = '';
            for (let i = 0; i < currentMailList.length; i++) {
                const m = currentMailList[i];
                const isSpecial = (m.from === 'неизвестен' || m.from === 'Б.');
                const statusClass = isSpecial ? '' : 'read';
                html += `
                    <div class="mail-item" onclick="openMailItem(${i})">
                        <span class="status ${statusClass}"></span>
                        <span class="from">${m.from}</span>
                        <span class="subject">${m.subject}</span>
                        <span class="date">${m.date}</span>
                    </div>
                `;
            }
            return html;
        }

        function renderMailList() {
            const content = document.getElementById('mailContent');
            if (content) {
                content.innerHTML = renderMailListContent();
            }
        }

        function switchMailFolder(folder) {
            currentMailFolder = folder;
            switch (folder) {
                case 'inbox': currentMailList = mailFolders.inbox; break;
                case 'sent': currentMailList = mailFolders.sent; break;
                case 'spam': currentMailList = mailFolders.spam; break;
                case 'draft': currentMailList = mailFolders.draft; break;
                case 'trash': currentMailList = mailFolders.trash; break;
                default: currentMailList = mailFolders.inbox;
            }
            document.querySelectorAll('.folder').forEach(el => el.classList.remove('active'));
            const active = document.querySelector(`.folder[data-folder="${folder}"]`);
            if (active) active.classList.add('active');
            renderMailList();
        }

        function openMailItem(index) {
